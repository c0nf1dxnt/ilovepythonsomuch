services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  python-service:
    build:
      context: ./python-service
    container_name: python-service
    environment:
      - OMP_NUM_THREADS=8
      - MKL_NUM_THREADS=4
      - HF_HOME=/cache/huggingface
      # Uncomment if you have pre-downloaded models in ./python-service/local_models
      # - MODELS_DIR=/app/local_models
    volumes:
      - hf_cache:/cache/huggingface
      # - ./python-service/local_models:/app/local_models:ro
    ports:
      - "8000:8000"
    restart: unless-stopped

  java-backend:
    build:
      context: ./java-backend
    container_name: java-backend
    environment:
      - PYTHON_BASE_URL=http://python-service:8000
      - QDRANT_BASE_URL=http://qdrant:6333
      - QDRANT_COLLECTION=message_chunks
      - QDRANT_VECTOR_SIZE=1024
    depends_on:
      - qdrant
      - python-service
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  qdrant_data:
  hf_cache:
