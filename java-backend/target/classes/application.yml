server:
  port: 8080

spring:
  application:
    name: search-backend
  jackson:
    property-naming-strategy: SNAKE_CASE
    deserialization:
      fail-on-unknown-properties: false

app:
  python:
    base-url: ${PYTHON_BASE_URL:http://python-service:8000}
  qdrant:
    base-url: ${QDRANT_BASE_URL:http://qdrant:6333}
    collection: ${QDRANT_COLLECTION:message_chunks}
    vector-size: ${QDRANT_VECTOR_SIZE:1024}
  http:
    connect-timeout-ms: 5000
    read-timeout-ms: 300000
  search:
    default-top-k: 10
    candidate-multiplier: 3

logging:
  level:
    root: INFO
    com.hackathon.search: DEBUG
